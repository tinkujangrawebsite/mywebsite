<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tinku Jangra | Google Ads Expert</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fff;
overflow-x:hidden;
color:#111;
}

/* Loader */

#loader{
position:fixed;
inset:0;
background:white;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
}

#loader h1{
font-size:60px;
font-weight:800;
background:linear-gradient(90deg,#2563eb,#06b6d4);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Glow */

.cursor-glow{
position:fixed;
width:300px;
height:300px;
background:radial-gradient(circle,
rgba(37,99,235,.18),
transparent 70%);
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:-1;
}

/* Navbar */

header{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:1200px;
padding:18px 40px;
background:rgba(255,255,255,.8);
backdrop-filter:blur(20px);
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.logo{
font-size:28px;
font-weight:800;
color:#2563eb;
}

nav ul{
display:flex;
gap:35px;
list-style:none;
}

nav a{
text-decoration:none;
font-weight:600;
color:#111;
}

/* Hero */

.hero{
min-height:100vh;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10%;
}

.hero-text h1{
font-size:80px;
font-weight:800;
line-height:1.1;
}

.hero-text span{
color:#2563eb;
}

.typing{
font-size:32px;
margin-top:20px;
color:#06b6d4;
font-weight:600;
}

.btn{
display:inline-block;
margin-top:30px;
padding:18px 45px;
background:linear-gradient(45deg,#2563eb,#06b6d4);
border-radius:50px;
color:white;
text-decoration:none;
font-weight:600;
}

/* Image */

.image-box{
width:450px;
height:450px;
background:linear-gradient(45deg,#2563eb,#06b6d4);
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
animation:float 4s ease-in-out infinite;
}

.image-box img{
width:390px;
height:390px;
object-fit:cover;
border-radius:50%;
border:8px solid rgba(255,255,255,.4);
}

@keyframes float{
50%{
transform:translateY(-20px);
}
}

@media(max-width:900px){

.hero{
flex-direction:column-reverse;
text-align:center;
padding-top:150px;
}

.hero-text h1{
font-size:50px;
}

.image-box{
width:300px;
height:300px;
}

.image-box img{
width:260px;
height:260px;
}
}/* Tablet */
@media screen and (max-width: 992px){

nav{
padding:15px 5%;
}

.hero{
flex-direction:column-reverse;
text-align:center;
padding:120px 5% 60px;
}

.hero-text h1{
font-size:50px;
}

.hero-text h2{
font-size:28px;
}

.hero-image img{
width:300px;
max-width:90%;
}

section{
padding:80px 5%;
}

.skills,
.portfolio{
grid-template-columns:repeat(2,1fr);
}
}

/* Mobile */
@media screen and (max-width: 768px){

nav{
flex-direction:column;
gap:15px;
padding:15px;
}

nav ul{
flex-wrap:wrap;
justify-content:center;
gap:12px;
}

.logo{
font-size:24px;
}

.hero{
padding-top:160px;
}

.hero-text h1{
font-size:38px;
line-height:1.2;
}

.hero-text h2{
font-size:22px;
}

.hero-text h3{
font-size:18px;
}

.hero-text p{
font-size:15px;
}

.hero-image img{
width:250px;
max-width:100%;
}

.title{
font-size:32px;
}

.skills,
.portfolio{
grid-template-columns:1fr;
}

.skill-box,
.project,
.about-box,
.contact-box{
padding:25px;
}

.btn{
padding:12px 25px;
font-size:14px;
}
}

/* Small Mobile */
@media screen and (max-width: 480px){

.hero-text h1{
font-size:30px;
}

.hero-text h2{
font-size:18px;
}

.title{
font-size:28px;
}

.hero-image img{
width:220px;
}

body{
overflow-x:hidden;
}

nav ul li a{
font-size:14px;
}

.contact-box h3{
font-size:15px;
}
}
</style>
</head>

<body>

<div id="loader">
<h1>Tinku Jangra</h1>
</div>

<div class="cursor-glow"></div>

<header>
<div class="logo">Tinku Jangra</div>

<nav>
<ul>
 <li><a href="index.html">home</a></li>
<li><a href="home.html">mywork</a></li>
<li><a href="about.html">About</a></li>
<li><a href="skills.html">Skills</a></li>

</ul>
</nav>
</header>

<section class="hero">

<div class="hero-text">

<h1>
Hi,<br>
I'm <span>Tinku Jangra</span>
</h1>

<div class="typing"></div>

<a href="Contact.html" class="btn">
Contact Me
</a>

</div>

<div class="image-box">

<!-- Apni Photo Lagao -->
<img src="image 22.jpg">

</div>

</section>

<script>

window.addEventListener("load",()=>{

gsap.to("#loader",{
opacity:0,
duration:1,
delay:1,
onComplete(){
loader.remove();
}
});

});

const glow=document.querySelector(".cursor-glow");

document.addEventListener("mousemove",(e)=>{
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

const text=[
"Google Ads Expert",
"Lead Generation Specialist",
"YouTube Ads Professional",
"PPC Marketing Expert"
];

let i=0;
let j=0;
let deleting=false;

function type(){

let current=text[i];

if(!deleting){

document.querySelector(".typing")
.innerHTML=current.substring(0,j++);

if(j>current.length){
deleting=true;
}

}else{

document.querySelector(".typing")
.innerHTML=current.substring(0,j--);

if(j==0){
deleting=false;
i=(i+1)%text.length;
}
}

setTimeout(type,deleting?60:120);

}

type();

gsap.from(".hero-text h1",{
y:100,
opacity:0,
duration:1.3
});

gsap.from(".image-box",{
scale:.5,
opacity:0,
duration:1.5
});

</script>

</body>
</html>
